version: 0.2

phases:
  pre_build:
    commands:
      - docker login -u $DOCKER_USER -p $DOCKER_PASS

  build:
    commands:
      - docker build -t devbank-frontend .
      - docker tag devbank-frontend YOUR_DOCKER/devbank-frontend:latest

  post_build:
    commands:
      - docker push YOUR_DOCKER/devbank-frontend:latest
